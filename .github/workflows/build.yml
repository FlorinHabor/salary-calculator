name: Build Calculator Ore Lucrate

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pandas

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "Calculator_Ore_Lucrate" src/calculator_salar/main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Windows
          path: dist/Calculator_Ore_Lucrate.exe

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller customtkinter pandas

      - name: Build macOS App
        run: |
          pyinstaller --onefile --noconsole --name "Calculator_Ore_Lucrate" src/calculator_salar/main.py

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-macOS
          path: |
            dist/Calculator_Ore_Lucrate
            dist/*.app