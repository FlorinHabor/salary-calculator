name: Build Calculator Ore Lucrate

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
 build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pandas openpyxl

      - name: Build EXE
        run: |
          pyinstaller --onefile --noconsole --name "Calculator_Windows" --paths "src/calculator_salar" --hidden-import "openpyxl" src/calculator_salar/main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Windows-Build
          path: dist/Calculator_Windows.exe

  build-macos:
    name: Build macOS ARM (M-Series)
    runs-on: macos-14  # Specifically use M1/ARM runner
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller customtkinter pandas openpyxl

      - name: Build macOS App
        run: |
          # Built as a single command to avoid YAML formatting errors
          pyinstaller --onefile --noconsole --windowed --name "Calculator_Mac_ARM" --paths "src/calculator_salar" src/calculator_salar/main.py

      - name: Verify Build
        run: |
          echo "Listing dist folder contents:"
          ls -R dist/

      - name: Archive App for Permissions
        run: |
          # We zip the .app bundle to preserve executable bits and permissions
          cd dist
          zip -r Calculator-Mac-ARM.zip Calculator_Mac_ARM.app

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Mac-ARM-Zip
          path: dist/Calculator-Mac-ARM.zip