name: Build Calculator Ore Lucrate

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12" 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller customtkinter pandas

      - name: Build EXE
        run: |
          # Added --paths so it finds the 'core' folder
          pyinstaller --onefile --noconsole --name "Calculator_Ore_Lucrate" --paths "src/calculator_salar" src/calculator_salar/main.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Windows
          path: dist/Calculator_Ore_Lucrate.exe

  build-macos:
    name: Build macOS App
    runs-on: macos-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller customtkinter pandas

      - name: Build macOS App
        run: |
          pyinstaller --onefile --noconsole --windowed --name "Calculator_Ore_Lucrate" --paths "src/calculator_salar" src/calculator_salar/main.py

      - name: Archive App for Permissions
        run: |
          cd dist
          zip -r Calculator-macOS.zip . -i "Calculator_Ore_Lucrate*"

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-macOS-Zip
          path: dist/Calculator-macOS.zip
          # Job for Intel Macs
  build-macos-intel:
    runs-on: macos-13 # Standard Intel runner
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller customtkinter pandas

      - name: Build Intel EXE
        run: pyinstaller --onefile --name "Calculator_Intel" --paths "src/calculator_salar" src/calculator_salar/main.py
        
      - name: Archive App for Permissions
        run: |
          cd dist
          zip -r Calculator-macOS.zip . -i "Calculator_Ore_Lucrate*"

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-macOS-Zip
          path: dist/Calculator-macOS.zip

  # Job for M1/M2/M3 Macs
  build-macos-arm:
    name: Build macOS ARM (M-Series)
    runs-on: macos-14
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip3 install pyinstaller customtkinter pandas

      - name: Build macOS App
        run: |
          # We specify the architecture explicitly for M-series
          pyinstaller --onefile --noconsole --windowed \
          --target-arch arm64 \
          --name "Calculator_ARM_M-Series" \
          --paths "src/calculator_salar" src/calculator_salar/main.py

      - name: Archive App
        run: |
          cd dist
          zip -r Calculator-ARM.zip . -i "Calculator_ARM_M-Series*"

      - name: Upload macOS build
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-ARM-Zip
          path: dist/Calculator-ARM.zip